services:
  - type: web
    name: quote-chaser-web
    runtime: node
    plan: starter
    autoDeploy: true
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_APP_NAME
        value: Quote Chaser
      - key: APP_BASE_URL
        value: https://quote-chaser.onrender.com
      - key: PASSWORD_RESET_TOKEN_TTL_MINUTES
        value: "60"
      - key: DATABASE_URL
        fromDatabase:
          name: quote-chaser-db
          property: connectionString

databases:
  - name: quote-chaser-db
    plan: basic-256mb
    databaseName: quotechaser
    user: quotechaser
